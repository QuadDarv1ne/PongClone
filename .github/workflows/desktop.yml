name: Build Desktop Releases

on:
  push:
    branches: [ master ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install pygame-ce pyinstaller

    - name: Build Windows EXE
      run: |
        cd PyPong
        pyinstaller --onefile --windowed --name EnhancedPong --icon=../assets/icon.ico --add-data "*.wav;." --add-data "*.ogg;." --add-data "*.mp3;." --add-data "music;music" pong_v4.py
      shell: pwsh

    - name: Upload Windows EXE
      uses: actions/upload-artifact@v4
      with:
        name: EnhancedPong-Windows
        path: PyPong/dist/EnhancedPong.exe

    - name: Create Release Asset
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: PyPong/dist/EnhancedPong.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libsdl2-dev libsdl2-mixer-dev libsdl2-image-dev libsdl2-ttf-dev

    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install pygame-ce pyinstaller

    - name: Build Linux Binary
      run: |
        cd PyPong
        pyinstaller --onefile --name EnhancedPong --add-data "*.wav:." --add-data "*.ogg:." --add-data "*.mp3:." --add-data "music:music" pong_v4.py

    - name: Make executable
      run: chmod +x PyPong/dist/EnhancedPong

    - name: Create tarball
      run: |
        cd PyPong/dist
        tar -czf EnhancedPong-Linux.tar.gz EnhancedPong

    - name: Upload Linux Binary
      uses: actions/upload-artifact@v4
      with:
        name: EnhancedPong-Linux
        path: PyPong/dist/EnhancedPong-Linux.tar.gz

    - name: Create Release Asset
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: PyPong/dist/EnhancedPong-Linux.tar.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install pygame-ce pyinstaller

    - name: Build macOS App
      run: |
        cd PyPong
        pyinstaller --onefile --windowed --name EnhancedPong --add-data "*.wav:." --add-data "*.ogg:." --add-data "*.mp3:." --add-data "music:music" pong_v4.py

    - name: Create DMG
      run: |
        cd PyPong/dist
        mkdir -p EnhancedPong.app/Contents/MacOS
        mv EnhancedPong EnhancedPong.app/Contents/MacOS/
        hdiutil create -volname EnhancedPong -srcfolder EnhancedPong.app -ov -format UDZO EnhancedPong-macOS.dmg

    - name: Upload macOS App
      uses: actions/upload-artifact@v4
      with:
        name: EnhancedPong-macOS
        path: PyPong/dist/EnhancedPong-macOS.dmg

    - name: Create Release Asset
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: PyPong/dist/EnhancedPong-macOS.dmg
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
