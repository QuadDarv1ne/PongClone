name: Test Game

on:
  push:
    branches: [ master, dev ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install pygame-ce

    - name: Syntax check
      run: |
        python -m py_compile PyPong/*.py
      shell: bash

    - name: Check imports
      run: |
        python -c "import sys; sys.path.insert(0, 'PyPong'); import config, entities, game_state, audio, effects, stats, settings, ui, tournament, themes, gamepad, mobile"
      shell: bash
